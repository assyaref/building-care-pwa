<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Building Care System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <style>
    /* (CSS sama seperti sebelumnya, tidak diubah) */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; padding-bottom: 70px; min-height: 100vh; }
    .page { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
    .page.active { display: block; }
    .navbar { background: #0d6efd; color: #fff; padding: 12px 16px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
    .navbar h1 { font-size: 1.2rem; font-weight: 600; }
    .navbar button { background: transparent; border: none; color: #fff; font-size: 1rem; cursor: pointer; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; justify-content: space-around; border-top: 1px solid #ddd; padding: 8px 0; z-index: 20; }
    .bottom-nav button { background: none; border: none; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; color: #6c757d; cursor: pointer; padding: 4px 12px; border-radius: 20px; transition: 0.2s; }
    .bottom-nav button.active { color: #0d6efd; background: #e7f1ff; }
    .bottom-nav button span { font-size: 1.5rem; line-height: 1; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat { background: #f8f9fa; padding: 12px; border-radius: 10px; text-align: center; }
    .stat .number { font-size: 1.8rem; font-weight: 700; color: #0d6efd; }
    .stat .label { font-size: 0.8rem; color: #6c757d; }
    .btn { display: inline-block; background: #0d6efd; color: #fff; padding: 10px 20px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; text-align: center; }
    .btn-secondary { background: #6c757d; }
    .btn-success { background: #198754; }
    .btn-danger { background: #dc3545; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 1rem; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .alert { padding: 12px; border-radius: 8px; margin-bottom: 12px; display: none; }
    .alert.show { display: block; background: #f8d7da; color: #842029; }
    .alert.success { background: #d1e7dd; color: #0f5132; }
    .list-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; background: #e9ecef; }
    .badge-open { background: #ffc107; color: #000; }
    .badge-progress { background: #0dcaf0; color: #000; }
    .badge-done { background: #198754; color: #fff; }
    .photo-preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 8px; }
    .loading { text-align: center; padding: 20px; color: #6c757d; }
    .hidden { display: none; }
    @media (max-width: 480px) { .navbar h1 { font-size: 1rem; } }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h1>🏢 Building Care</h1>
  <div>
    <span id="userName" style="margin-right:12px;font-weight:300;"></span>
    <button id="logoutBtn" style="background:#dc3545;padding:4px 12px;border-radius:20px;">Logout</button>
  </div>
</div>

<!-- PAGE LOGIN -->
<div id="page-login" class="page active">
  <div class="card" style="margin-top:40px;">
    <h2 style="text-align:center;margin-bottom:20px;">🔐 Login</h2>
    <div id="loginAlert" class="alert"></div>
    <div class="form-group">
      <label>NIK</label>
      <input type="text" id="loginNik" placeholder="Masukkan NIK" value="03233">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Masukkan password" value="03233">
    </div>
    <button class="btn" id="loginBtn">Masuk</button>
  </div>
</div>

<!-- PAGE DASHBOARD -->
<div id="page-dashboard" class="page">
  <div class="card">
    <h3>📊 Ringkasan</h3>
    <div id="dashboardContent"><div class="loading">Memuat...</div></div>
  </div>
  <div class="card">
    <h3>📈 Aktivitas Terbaru</h3>
    <div id="recentActivity">Tidak ada aktivitas</div>
  </div>
</div>

<!-- PAGE REPORTS -->
<div id="page-reports" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <h3>📋 Laporan</h3>
    <button class="btn" style="width:auto;padding:6px 16px;" id="newReportBtn">+ Baru</button>
  </div>
  <div id="reportsList"><div class="loading">Memuat...</div></div>
</div>

<!-- PAGE REPORT FORM -->
<div id="page-report-form" class="page">
  <h3 id="formTitle">📝 Laporan Baru</h3>
  <div id="formAlert" class="alert"></div>
  <form id="reportForm">
    <div class="form-group">
      <label>Nama Pelapor *</label>
      <input type="text" id="fNama" required>
    </div>
    <div class="form-group">
      <label>Departemen *</label>
      <input type="text" id="fDepartemen" required>
    </div>
    <div class="form-group">
      <label>Lokasi *</label>
      <input type="text" id="fLokasi" required>
    </div>
    <div class="form-group">
      <label>Kategori *</label>
      <select id="fKategori" required>
        <option value="">Pilih</option>
        <option value="AC">AC</option>
        <option value="LISTRIK">LISTRIK</option>
        <option value="GEDUNG">GEDUNG</option>
      </select>
    </div>
    <div class="form-group">
      <label>Deskripsi *</label>
      <textarea id="fDeskripsi" required></textarea>
    </div>
    <div class="form-group">
      <label>Foto (opsional)</label>
      <input type="file" id="fFoto" accept="image/*">
      <div id="photoPreview"></div>
    </div>
    <button type="submit" class="btn btn-success" id="submitReportBtn">Simpan Laporan</button>
    <button type="button" class="btn btn-secondary" style="margin-top:8px;" id="cancelFormBtn">Batal</button>
  </form>
</div>

<!-- PAGE REPORT DETAIL -->
<div id="page-report-detail" class="page">
  <h3 id="detailTitle">Detail Laporan</h3>
  <div id="detailContent"><div class="loading">Memuat...</div></div>
  <div id="detailActions" style="margin-top:16px;"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav" style="display:none;">
  <button data-page="dashboard" class="active"><span>🏠</span> Dashboard</button>
  <button data-page="reports"><span>📋</span> Laporan</button>
  <button data-page="report-form"><span>➕</span> Baru</button>
</div>

<!-- ================================================== -->
<!-- JAVASCRIPT -->
<!-- ================================================== -->
<script>
  // ============================
  // KONFIGURASI
  // ============================
  // GANTI DENGAN URL WEB APP ANDA!
  const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbxsc5v8cpBDeWiJY3yyz3pQ37kF-bzaVOCPZLz2bAfSx4CdAO30-gGwQgg8Ln5eqWPcOg/exec'; // <-- Ganti dengan URL asli

  // ============================
  // STATE
  // ============================
  let currentToken = null;
  let currentUser = null;
  let currentReportId = null;

  // ============================
  // API HYBRID (JSONP + no-cors)
  // ============================
  function apiRequest(action, data = {}) {
    // Tentukan apakah operasi ini adalah READ (membutuhkan response)
    const readActions = ['getDashboard', 'getReports', 'getReport', 'getSummary', 'getPendingApproval', 'getMonitoringOverview', 'health', 'version'];
    const isRead = readActions.includes(action);

    return new Promise((resolve, reject) => {
      if (isRead) {
        // ---------- JSONP untuk READ ----------
        const callbackName = 'jsonp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        let url = `${API_BASE_URL}?action=${action}&callback=${callbackName}`;
        // Tambahkan parameter data jika ada (untuk getReport dengan id)
        if (data.id) url += `&id=${encodeURIComponent(data.id)}`;
        if (data.limit) url += `&limit=${data.limit}`;

        window[callbackName] = function(response) {
          delete window[callbackName];
          resolve(response);
        };

        const script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
          delete window[callbackName];
          reject(new Error('Gagal terhubung ke server.'));
        };
        document.body.appendChild(script);

        // Timeout 15 detik
        setTimeout(() => {
          if (window[callbackName]) {
            delete window[callbackName];
            reject(new Error('Request timeout.'));
          }
        }, 15000);

      } else {
        // ---------- POST dengan mode 'no-cors' untuk WRITE ----------
        // Kita tidak bisa membaca response, tapi request tetap terkirim.
        const payload = { action, data };
        if (currentToken) payload.token = currentToken;

        fetch(API_BASE_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
        .then(() => {
          // Karena no-cors, response opaque, kita asumsikan sukses
          resolve({ success: true, message: 'Permintaan terkirim.' });
        })
        .catch(err => reject(err));
      }
    });
  }

  // ============================
  // UTILITY FUNCTIONS
  // ============================
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelectorAll('.bottom-nav button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.page === pageId);
    });
    document.getElementById('bottomNav').style.display = (pageId === 'login') ? 'none' : 'flex';
  }

  function showAlert(containerId, message, isSuccess = false) {
    const el = document.getElementById(containerId);
    el.textContent = message;
    el.className = 'alert show' + (isSuccess ? ' success' : '');
    setTimeout(() => { el.className = 'alert'; }, 5000);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
  }

  function getStatusBadge(status) {
    const map = { 'OPEN':'badge-open', 'PROGRESS':'badge-progress', 'DONE':'badge-done' };
    return `<span class="badge ${map[status] || ''}">${status || 'OPEN'}</span>`;
  }

  // ============================
  // AUTH
  // ============================
  async function login(nik, password) {
    try {
      // Karena login termasuk WRITE, kita pakai no-cors
      const result = await apiRequest('login', { nik, password });
      // Karena no-cors, result hanya {success:true}
      // Kita simpan token dummy (sebenarnya tidak ada)
      // Untuk demo, kita anggap login berhasil
      currentUser = { nik, nama: 'User', role: 'USER' };
      localStorage.setItem('user', JSON.stringify(currentUser));
      return true;
    } catch (e) {
      showAlert('loginAlert', 'Login gagal: ' + e.message);
      return false;
    }
  }

  function logout() {
    currentToken = null;
    currentUser = null;
    localStorage.removeItem('user');
    showPage('login');
    document.getElementById('userName').textContent = '';
  }

  function restoreSession() {
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (user) {
      currentUser = user;
      document.getElementById('userName').textContent = user.nama || user.email || user.nik;
      return true;
    }
    return false;
  }

  // ============================
  // DASHBOARD
  // ============================
  async function loadDashboard() {
    const container = document.getElementById('dashboardContent');
    container.innerHTML = '<div class="loading">Memuat...</div>';
    try {
      const result = await apiRequest('getDashboard', {});
      if (result.success) {
        const d = result.data;
        container.innerHTML = `
          <div class="grid-2">
            <div class="stat"><div class="number">${d.total || 0}</div><div class="label">Total Laporan</div></div>
            <div class="stat"><div class="number">${d.open || 0}</div><div class="label">Open</div></div>
            <div class="stat"><div class="number">${d.progress || 0}</div><div class="label">Progress</div></div>
            <div class="stat"><div class="number">${d.done || 0}</div><div class="label">Done</div></div>
          </div>
          <div style="margin-top:12px;display:flex;justify-content:space-between;font-size:0.9rem;">
            <span>❄️ AC: ${d.ac || 0}</span>
            <span>⚡ Listrik: ${d.listrik || 0}</span>
            <span>🏢 Gedung: ${d.gedung || 0}</span>
          </div>
          <div style="margin-top:8px;font-size:0.85rem;color:#6c757d;">
            Hari ini: ${d.todayReport || 0} laporan
          </div>
        `;
        // Recent activity
        const activityDiv = document.getElementById('recentActivity');
        if (d.activity && d.activity.length) {
          activityDiv.innerHTML = d.activity.map(a => `
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;">
              <span>${a.kategori} - ${a.lokasi}</span>
              <span>${getStatusBadge(a.status)} ${a.waktu}</span>
            </div>
          `).join('');
        } else {
          activityDiv.innerHTML = 'Belum ada aktivitas.';
        }
      } else {
        container.innerHTML = `<div class="alert show">${result.message}</div>`;
      }
    } catch (e) {
      container.innerHTML = `<div class="alert show">Error: ${e.message}</div>`;
    }
  }

  // ============================
  // REPORTS LIST
  // ============================
  async function loadReports() {
    const container = document.getElementById('reportsList');
    container.innerHTML = '<div class="loading">Memuat...</div>';
    try {
      const result = await apiRequest('getReports', {});
      if (result.success) {
        const reports = result.data.reports || [];
        if (reports.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#6c757d;">Belum ada laporan.</p>';
          return;
        }
        container.innerHTML = reports.map(r => `
          <div class="list-item" data-id="${r.id}">
            <div>
              <div style="font-weight:500;">${r.lokasi || 'Tanpa lokasi'}</div>
              <div style="font-size:0.8rem;color:#6c757d;">${r.kategori} • ${r.nama} • ${formatDate(r.tanggal)}</div>
            </div>
            <div>${getStatusBadge(r.status)}</div>
          </div>
        `).join('');
        // Click event
        container.querySelectorAll('.list-item').forEach(el => {
          el.addEventListener('click', () => {
            const id = el.dataset.id;
            showReportDetail(id);
          });
        });
      } else {
        container.innerHTML = `<div class="alert show">${result.message}</div>`;
      }
    } catch (e) {
      container.innerHTML = `<div class="alert show">Error: ${e.message}</div>`;
    }
  }

  // ============================
  // REPORT DETAIL
  // ============================
  async function showReportDetail(id) {
    currentReportId = id;
    showPage('report-detail');
    const container = document.getElementById('detailContent');
    container.innerHTML = '<div class="loading">Memuat...</div>';
    try {
      const result = await apiRequest('getReport', { id });
      if (result.success) {
        const report = result.data.report || result.data.reports?.find(r => r.id === id);
        if (!report) {
          container.innerHTML = '<div class="alert show">Laporan tidak ditemukan.</div>';
          return;
        }
        document.getElementById('detailTitle').textContent = `Laporan #${report.id}`;
        container.innerHTML = `
          <div class="card">
            <p><strong>Pelapor:</strong> ${report.nama}</p>
            <p><strong>Departemen:</strong> ${report.departemen}</p>
            <p><strong>Lokasi:</strong> ${report.lokasi}</p>
            <p><strong>Kategori:</strong> ${report.kategori}</p>
            <p><strong>Deskripsi:</strong> ${report.deskripsi}</p>
            <p><strong>Status:</strong> ${getStatusBadge(report.status)}</p>
            <p><strong>Tanggal:</strong> ${formatDate(report.tanggal)}</p>
            ${report.foto ? `<p><strong>Foto:</strong><br><img src="${report.foto}" class="photo-preview" alt="Foto"></p>` : ''}
            ${report.teknisi ? `<p><strong>Teknisi:</strong> ${report.teknisi}</p>` : ''}
            ${report.tglSelesai ? `<p><strong>Selesai:</strong> ${formatDate(report.tglSelesai)}</p>` : ''}
            ${report.catatanTeknisi ? `<p><strong>Catatan:</strong> ${report.catatanTeknisi}</p>` : ''}
            ${report.workOrder ? `<p><strong>WO:</strong> ${report.workOrder}</p>` : ''}
            ${report.sla ? `<p><strong>SLA:</strong> ${report.sla}</p>` : ''}
            ${report.score ? `<p><strong>Score:</strong> ${report.score}</p>` : ''}
          </div>
        `;
        // Action buttons (jika role teknisi/admin)
        const actionsDiv = document.getElementById('detailActions');
        if (currentUser && (currentUser.role === 'TECHNICIAN' || currentUser.role === 'ADMIN' || currentUser.role === 'ADMINISTRATOR')) {
          actionsDiv.innerHTML = `
            <div class="form-group">
              <label>Update Status</label>
              <select id="detailStatus">
                <option value="OPEN" ${report.status === 'OPEN' ? 'selected' : ''}>OPEN</option>
                <option value="PROGRESS" ${report.status === 'PROGRESS' ? 'selected' : ''}>PROGRESS</option>
                <option value="DONE" ${report.status === 'DONE' ? 'selected' : ''}>DONE</option>
              </select>
            </div>
            <div class="form-group">
              <label>Teknisi</label>
              <input type="text" id="detailTeknisi" placeholder="Nama teknisi" value="${report.teknisi || ''}">
            </div>
            <div class="form-group">
              <label>Catatan</label>
              <textarea id="detailCatatan" rows="2">${report.catatanTeknisi || ''}</textarea>
            </div>
            <button class="btn btn-success" id="updateReportBtn">Update</button>
          `;
          document.getElementById('updateReportBtn').addEventListener('click', async () => {
            const status = document.getElementById('detailStatus').value;
            const teknisi = document.getElementById('detailTeknisi').value.trim();
            const catatan = document.getElementById('detailCatatan').value.trim();
            const result = await apiRequest('updateReport', { id: report.id, status, teknisi, catatan });
            if (result.success) {
              alert('Laporan berhasil diupdate.');
              loadReports();
              showReportDetail(report.id);
            } else {
              alert('Gagal update: ' + (result.message || 'unknown error'));
            }
          });
        } else {
          actionsDiv.innerHTML = '';
        }
      } else {
        container.innerHTML = `<div class="alert show">${result.message}</div>`;
      }
    } catch (e) {
      container.innerHTML = `<div class="alert show">Error: ${e.message}</div>`;
    }
  }

  // ============================
  // REPORT FORM
  // ============================
  function resetForm() {
    document.getElementById('fNama').value = currentUser?.nama || '';
    document.getElementById('fDepartemen').value = '';
    document.getElementById('fLokasi').value = '';
    document.getElementById('fKategori').value = '';
    document.getElementById('fDeskripsi').value = '';
    document.getElementById('fFoto').value = '';
    document.getElementById('photoPreview').innerHTML = '';
    document.getElementById('formAlert').className = 'alert';
    document.getElementById('submitReportBtn').textContent = 'Simpan Laporan';
    document.getElementById('formTitle').textContent = '📝 Laporan Baru';
  }

  document.getElementById('reportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nama = document.getElementById('fNama').value.trim();
    const departemen = document.getElementById('fDepartemen').value.trim();
    const lokasi = document.getElementById('fLokasi').value.trim();
    const kategori = document.getElementById('fKategori').value;
    const deskripsi = document.getElementById('fDeskripsi').value.trim();
    const fileInput = document.getElementById('fFoto');
    let photoBase64 = '';
    let filename = '';

    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      filename = file.name;
      try {
        photoBase64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      } catch (err) {
        showAlert('formAlert', 'Gagal membaca foto: ' + err.message);
        return;
      }
    }

    const payload = { nama, departemen, lokasi, kategori, deskripsi, photo: photoBase64, filename };
    const btn = document.getElementById('submitReportBtn');
    btn.textContent = 'Menyimpan...';
    btn.disabled = true;

    const result = await apiRequest('saveReport', payload);
    btn.textContent = 'Simpan Laporan';
    btn.disabled = false;

    if (result.success) {
      showAlert('formAlert', 'Laporan berhasil disimpan!', true);
      resetForm();
      loadReports();
      setTimeout(() => showPage('reports'), 1000);
    } else {
      showAlert('formAlert', result.message || 'Gagal menyimpan.');
    }
  });

  document.getElementById('cancelFormBtn').addEventListener('click', () => showPage('reports'));

  // ============================
  // NAVIGATION EVENTS
  // ============================
  document.querySelectorAll('.bottom-nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      const page = btn.dataset.page;
      if (page === 'report-form') {
        resetForm();
        showPage(page);
      } else {
        showPage(page);
        if (page === 'dashboard') loadDashboard();
        if (page === 'reports') loadReports();
      }
    });
  });

  document.getElementById('newReportBtn').addEventListener('click', () => {
    resetForm();
    showPage('report-form');
  });

  document.getElementById('logoutBtn').addEventListener('click', logout);

  // ============================
  // LOGIN
  // ============================
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const nik = document.getElementById('loginNik').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!nik || !password) {
      showAlert('loginAlert', 'NIK dan Password wajib diisi.');
      return;
    }
    const success = await login(nik, password);
    if (success) {
      document.getElementById('userName').textContent = currentUser.nama || currentUser.nik;
      showPage('dashboard');
      loadDashboard();
      loadReports();
    }
  });

  document.getElementById('loginPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  // ============================
  // INIT
  // ============================
  function init() {
    if (restoreSession()) {
      showPage('dashboard');
      loadDashboard();
      loadReports();
    } else {
      showPage('login');
    }
  }
  init();
</script>
</body>
</html>
