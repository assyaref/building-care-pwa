<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Building Care System · Enterprise</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            box-sizing: border-box;
        }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 16px;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 820px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 80vh;
            max-height: 96vh;
            transition: box-shadow 0.3s;
        }

        /* ── header ── */
        .app-header {
            background: #1e56cf;
            padding: 18px 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .app-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
        }
        .app-brand .logo {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .app-brand h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin: 0;
            line-height: 1.2;
        }
        .app-brand span {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.7;
            display: block;
        }

        .app-user {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #fff;
        }
        .app-user .greeting {
            text-align: right;
            line-height: 1.3;
        }
        .app-user .greeting .name {
            font-size: 13px;
            font-weight: 600;
        }
        .app-user .greeting .role {
            font-size: 10px;
            opacity: 0.7;
        }
        .app-user .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: background 0.2s;
        }
        .app-user .avatar:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ── tabs ── */
        .app-tabs {
            display: flex;
            gap: 4px;
            background: #f8fafc;
            padding: 4px 20px;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
        }
        .app-tabs button {
            border: none;
            background: transparent;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .app-tabs button i {
            font-size: 14px;
        }
        .app-tabs button:hover {
            color: #1e293b;
            background: #f1f5f9;
        }
        .app-tabs button.active {
            color: #1e56cf;
            background: #ffffff;
            box-shadow: 0 -2px 0 #1e56cf inset;
        }
        .app-tabs button .badge {
            background: #e9edf2;
            color: #475569;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 20px;
            margin-left: 2px;
        }
        .app-tabs button.active .badge {
            background: #dbeafe;
            color: #1e56cf;
        }

        /* ── content ── */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px 28px;
            background: #ffffff;
        }
        .app-content::-webkit-scrollbar {
            width: 4px;
        }
        .app-content::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 8px;
        }
        .app-content::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .page {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 24px;
        }
        .form-grid .full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 5px;
        }
        .form-label i {
            margin-right: 4px;
            color: #64748b;
        }

        .form-control {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            background: #fafbfc;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            color: #0f172a;
        }
        .form-control:focus {
            border-color: #1e56cf;
            box-shadow: 0 0 0 3px rgba(30, 86, 207, 0.12);
            background: #fff;
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }
        .char-counter {
            text-align: right;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 3px;
        }

        /* ── category chips ── */
        .category-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .category-chip {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            background: #fafbfc;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1 0 auto;
            justify-content: center;
        }
        .category-chip i {
            font-size: 14px;
            color: #94a3b8;
        }
        .category-chip:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .category-chip.active {
            border-color: #1e56cf;
            background: #eff4ff;
            color: #1e56cf;
        }
        .category-chip.active i {
            color: #1e56cf;
        }

        /* ── priority pills ── */
        .priority-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .priority-pill {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            background: #fafbfc;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1 0 auto;
            justify-content: center;
        }
        .priority-pill .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .priority-pill:hover {
            background: #f1f5f9;
        }
        .priority-pill.active {
            border-color: currentColor;
            background: #f8fafc;
        }
        .priority-pill[data-priority="normal"].active {
            border-color: #22c55e;
            background: #f0fdf4;
            color: #15803d;
        }
        .priority-pill[data-priority="high"].active {
            border-color: #f59e0b;
            background: #fffbeb;
            color: #b45309;
        }
        .priority-pill[data-priority="urgent"].active {
            border-color: #ef4444;
            background: #fef2f2;
            color: #dc2626;
        }

        /* ── photo upload ── */
        .photo-upload-area {
            border: 2px dashed #d1d9e6;
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
            background: #fafbfc;
            transition: all 0.2s;
            cursor: pointer;
        }
        .photo-upload-area:hover {
            border-color: #94a3b8;
            background: #f8fafc;
        }
        .photo-upload-area.dragover {
            border-color: #1e56cf;
            background: #eff4ff;
        }
        .photo-upload-area.has-images {
            border-style: solid;
            border-color: #22c55e;
            background: #f0fdf4;
        }
        .photo-upload-area .icon {
            font-size: 26px;
            color: #94a3b8;
            margin-bottom: 2px;
        }
        .photo-upload-area .hint {
            font-size: 11px;
            font-weight: 500;
            color: #64748b;
        }
        .photo-upload-area .sub-hint {
            font-size: 10px;
            color: #94a3b8;
        }
        .photo-preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }
        .photo-preview-grid img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #e9edf2;
            background: #fff;
        }

        .upload-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .upload-buttons button {
            border: none;
            padding: 7px 18px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-camera {
            background: #1e56cf;
            color: #fff;
        }
        .btn-camera:hover {
            background: #1a4bb8;
        }
        .btn-gallery {
            background: #f1f5f9;
            color: #334155;
        }
        .btn-gallery:hover {
            background: #e2e8f0;
        }

        /* ── submit button ── */
        .btn-submit {
            width: 100%;
            border: none;
            background: #1e56cf;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            padding: 13px 20px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 4px;
        }
        .btn-submit:hover {
            background: #1a4bb8;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(30, 86, 207, 0.25);
        }
        .btn-submit:active {
            transform: translateY(0);
        }

        /* ── history list ── */
        .history-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .history-toolbar .search-wrap {
            flex: 1;
            min-width: 180px;
            position: relative;
        }
        .history-toolbar .search-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 13px;
        }
        .history-toolbar .search-wrap input {
            width: 100%;
            padding: 9px 12px 9px 36px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 13px;
            background: #fafbfc;
            outline: none;
            transition: all 0.2s;
        }
        .history-toolbar .search-wrap input:focus {
            border-color: #1e56cf;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(30, 86, 207, 0.08);
        }
        .history-toolbar .btn-filter {
            border: 1.5px solid #e2e8f0;
            background: #fafbfc;
            padding: 9px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-toolbar .btn-filter:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .history-item {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.15s;
            margin-bottom: 10px;
        }
        .history-item:hover {
            border-color: #cbd5e1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .history-item .info {
            flex: 1;
            min-width: 0;
        }
        .history-item .info .top {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }
        .history-item .info .top .status-badge {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .status-done {
            background: #dcfce7;
            color: #15803d;
        }
        .status-progress {
            background: #fef3c7;
            color: #b45309;
        }
        .status-open {
            background: #fecaca;
            color: #b91c1c;
        }

        .history-item .info .title {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-item .info .title i {
            font-size: 13px;
        }
        .history-item .info .meta {
            font-size: 11px;
            color: #64748b;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            margin-top: 1px;
        }
        .history-item .info .meta i {
            width: 14px;
            text-align: center;
        }
        .history-item .thumb {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            object-fit: cover;
            background: #f1f5f9;
            border: 1px solid #e9edf2;
            flex-shrink: 0;
        }
        .history-item .arrow {
            color: #94a3b8;
            font-size: 13px;
            flex-shrink: 0;
        }

        .history-empty {
            text-align: center;
            padding: 48px 20px;
            color: #94a3b8;
        }
        .history-empty i {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.4;
        }
        .history-empty p {
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 4px;
            color: #64748b;
        }
        .history-empty span {
            font-size: 12px;
        }

        /* ── toast ── */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            pointer-events: none;
            width: 100%;
            max-width: 480px;
            padding: 0 16px;
        }
        .toast {
            background: #0f172a;
            color: #fff;
            padding: 12px 22px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transform: translateY(12px) scale(0.97);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: auto;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .toast.success {
            background: #065f46;
        }
        .toast.error {
            background: #991b1b;
        }
        .toast.info {
            background: #1e3a5f;
        }

        /* ── responsive ── */
        @media (max-width: 640px) {
            body {
                padding: 12px 8px;
            }
            .app-container {
                border-radius: 20px;
                min-height: 92vh;
                max-height: 98vh;
            }
            .app-header {
                padding: 14px 18px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .app-brand h1 {
                font-size: 15px;
            }
            .app-user {
                justify-content: space-between;
            }
            .app-user .greeting .name {
                font-size: 12px;
            }
            .app-tabs {
                padding: 4px 12px;
                overflow-x: auto;
                flex-wrap: nowrap;
            }
            .app-tabs button {
                padding: 8px 14px;
                font-size: 12px;
                white-space: nowrap;
            }
            .app-tabs button span {
                display: none;
            }
            .app-tabs button i {
                font-size: 15px;
            }
            .app-content {
                padding: 16px 14px 20px;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .form-grid .full-width {
                grid-column: 1;
            }
            .category-group,
            .priority-group {
                flex-wrap: wrap;
            }
            .category-chip,
            .priority-pill {
                flex: 1 0 calc(50% - 6px);
            }
            .history-item {
                padding: 12px 14px;
                gap: 10px;
            }
            .history-item .thumb {
                width: 44px;
                height: 44px;
            }
            .toast-container {
                bottom: 20px;
                padding: 0 12px;
            }
            .toast {
                font-size: 12px;
                padding: 10px 18px;
            }
            .upload-buttons button {
                flex: 1;
                justify-content: center;
            }
        }

        @media (max-width: 400px) {
            .category-chip,
            .priority-pill {
                flex: 1 0 100%;
            }
        }
    </style>
</head>
<body>

    <!-- ─── TOAST ─── -->
    <div class="toast-container" id="toastContainer">
        <div class="toast" id="toast"></div>
    </div>

    <!-- ─── APP ─── -->
    <div class="app-container">

        <!-- ═══ HEADER ═══ -->
        <header class="app-header">
            <div class="app-brand">
                <div class="logo"><i class="fa-solid fa-building"></i></div>
                <div>
                    <h1>CareSystem <span style="display:inline;font-weight:400;opacity:0.8;font-size:12px;">v3.5</span></h1>
                    <span>Enterprise · Facility Management</span>
                </div>
            </div>
            <div class="app-user">
                <div class="greeting">
                    <div class="name">Halo, Tukang Lapor 👋</div>
                    <div class="role">General Affair</div>
                </div>
                <div class="avatar" id="avatarBtn" title="Profile"><i class="fa-regular fa-user"></i></div>
            </div>
        </header>

        <!-- ═══ TABS ═══ -->
        <div class="app-tabs" role="tablist">
            <button class="active" data-tab="report" role="tab">
                <i class="fa-solid fa-file-pen"></i>
                <span>Buat Laporan</span>
            </button>
            <button data-tab="history" role="tab">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Riwayat</span>
                <span class="badge" id="historyBadge">0</span>
            </button>
        </div>

        <!-- ═══ CONTENT ═══ -->
        <div class="app-content">

            <!-- ─── PAGE: REPORT ─── -->
            <div class="page active" id="pageReport" role="tabpanel">
                <form id="reportForm" novalidate>
                    <div class="form-grid">

                        <!-- Lokasi -->
                        <div class="full-width">
                            <label class="form-label" for="locationInput"><i class="fa-solid fa-location-dot"></i> Lokasi Kerusakan</label>
                            <input id="locationInput" class="form-control" type="text" placeholder="Contoh: Ruang Meeting, Toilet Lt. 2" required />
                        </div>

                        <!-- Kategori -->
                        <div class="full-width">
                            <label class="form-label"><i class="fa-solid fa-cubes"></i> Kategori Kerusakan</label>
                            <div class="category-group" id="categoryGroup">
                                <button type="button" class="category-chip active" data-category="listrik">
                                    <i class="fa-solid fa-bolt"></i> LISTRIK
                                </button>
                                <button type="button" class="category-chip" data-category="ac">
                                    <i class="fa-solid fa-snowflake"></i> AC
                                </button>
                                <button type="button" class="category-chip" data-category="bangunan">
                                    <i class="fa-solid fa-building"></i> BANGUNAN
                                </button>
                                <button type="button" class="category-chip" data-category="lainnya">
                                    <i class="fa-solid fa-ellipsis"></i> LAINNYA
                                </button>
                            </div>
                            <input type="hidden" id="categoryHidden" value="listrik" />
                        </div>

                        <!-- Prioritas -->
                        <div class="full-width">
                            <label class="form-label"><i class="fa-solid fa-flag"></i> Prioritas</label>
                            <div class="priority-group" id="priorityGroup">
                                <button type="button" class="priority-pill active" data-priority="normal">
                                    <span class="dot" style="background:#22c55e;"></span> NORMAL
                                </button>
                                <button type="button" class="priority-pill" data-priority="high">
                                    <span class="dot" style="background:#f59e0b;"></span> HIGH
                                </button>
                                <button type="button" class="priority-pill" data-priority="urgent">
                                    <span class="dot" style="background:#ef4444;"></span> URGENT
                                </button>
                            </div>
                            <input type="hidden" id="priorityHidden" value="normal" />
                        </div>

                        <!-- Deskripsi -->
                        <div class="full-width">
                            <label class="form-label" for="descInput"><i class="fa-solid fa-pen-to-square"></i> Deskripsi Kerusakan</label>
                            <textarea id="descInput" class="form-control" rows="3" placeholder="Jelaskan kerusakan secara detail…" required></textarea>
                            <div class="char-counter"><span id="charCount">0</span> / 500 karakter</div>
                        </div>

                        <!-- Foto -->
                        <div class="full-width">
                            <label class="form-label"><i class="fa-solid fa-camera"></i> Foto Kerusakan</label>
                            <div class="photo-upload-area" id="photoArea">
                                <div class="icon"><i class="fa-regular fa-image"></i></div>
                                <div class="hint">Seret &amp; letakkan foto di sini</div>
                                <div class="sub-hint">atau gunakan tombol di bawah</div>
                                <div class="photo-preview-grid" id="photoPreview"></div>
                                <div class="upload-buttons">
                                    <button type="button" class="btn-camera" id="btnCamera"><i class="fa-solid fa-camera"></i> Ambil Foto</button>
                                    <button type="button" class="btn-gallery" id="btnGallery"><i class="fa-regular fa-folder-open"></i> Galeri</button>
                                </div>
                            </div>
                            <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" />
                            <input type="hidden" id="photoCount" value="0" />
                        </div>

                        <!-- Submit -->
                        <div class="full-width" style="margin-top:6px;">
                            <button type="submit" class="btn-submit">
                                <i class="fa-solid fa-paper-plane"></i> Kirim Laporan
                            </button>
                        </div>

                    </div>
                </form>
            </div>

            <!-- ─── PAGE: HISTORY ─── -->
            <div class="page" id="pageHistory" role="tabpanel">
                <div class="history-toolbar">
                    <div class="search-wrap">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="searchInput" type="text" placeholder="Cari lokasi, kategori, atau status…" />
                    </div>
                    <button class="btn-filter" id="filterBtn"><i class="fa-solid fa-sliders"></i> Filter</button>
                </div>
                <div id="historyList">
                    <!-- items rendered by JS -->
                </div>
                <div class="history-empty" id="historyEmpty" style="display:none;">
                    <i class="fa-regular fa-face-smile"></i>
                    <p>Belum ada laporan</p>
                    <span>Mulai buat laporan pertama Anda</span>
                </div>
            </div>

        </div><!-- /app-content -->
    </div><!-- /app-container -->

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ──────────────────────────────────────────
            const $ = (s) => document.querySelector(s);
            const $$ = (s) => document.querySelectorAll(s);

            const tabs = $$('[data-tab]');
            const pageReport = $('#pageReport');
            const pageHistory = $('#pageHistory');
            const historyList = $('#historyList');
            const historyEmpty = $('#historyEmpty');
            const historyBadge = $('#historyBadge');
            const searchInput = $('#searchInput');
            const filterBtn = $('#filterBtn');

            // form
            const reportForm = $('#reportForm');
            const locationInput = $('#locationInput');
            const descInput = $('#descInput');
            const charCount = $('#charCount');
            const categoryGroup = $('#categoryGroup');
            const priorityGroup = $('#priorityGroup');
            const categoryHidden = $('#categoryHidden');
            const priorityHidden = $('#priorityHidden');
            const photoArea = $('#photoArea');
            const photoPreview = $('#photoPreview');
            const fileInput = $('#fileInput');
            const btnCamera = $('#btnCamera');
            const btnGallery = $('#btnGallery');
            const photoCount = $('#photoCount');

            const toast = $('#toast');
            let toastTimer = null;

            // ─── state ──────────────────────────────────────────────
            const state = {
                category: 'listrik',
                priority: 'normal',
                photos: [], // array of { id, dataURL }
                history: [],
                idCounter: 0,
                filter: '',
            };

            // ─── seed data ──────────────────────────────────────────
            function seedHistory() {
                const reports = [{
                    id: ++state.idCounter,
                    location: 'Ruang Meeting Lantai 3',
                    category: 'listrik',
                    priority: 'normal',
                    description: 'Lampu plafon mati 3 titik, area rapat gelap.',
                    status: 'done',
                    date: '24 Jun 2026',
                    time: '10:30',
                    photo: 'https://images.unsplash.com/photo-1620283085439-39620a1e21c4?auto=format&fit=crop&w=80&q=80'
                }, {
                    id: ++state.idCounter,
                    location: 'Ruang HRD',
                    category: 'ac',
                    priority: 'high',
                    description: 'AC tidak dingin, suhu ruangan 31°C, kompresor mati.',
                    status: 'progress',
                    date: '23 Jun 2026',
                    time: '14:15',
                    photo: 'https://images.unsplash.com/photo-1621905251189-08b45d6a269e?auto=format&fit=crop&w=80&q=80'
                }, {
                    id: ++state.idCounter,
                    location: 'Toilet Pria Lt. 2',
                    category: 'bangunan',
                    priority: 'urgent',
                    description: 'Kran air wastafel bocor deras, lantai tergenang.',
                    status: 'open',
                    date: '22 Jun 2026',
                    time: '09:45',
                    photo: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=80&q=80'
                }, {
                    id: ++state.idCounter,
                    location: 'Ruang Server Lt. 2',
                    category: 'listrik',
                    priority: 'urgent',
                    description: 'UPS berbunyi alarm, indikasi overload pada phase R.',
                    status: 'progress',
                    date: '20 Jun 2026',
                    time: '11:20',
                    photo: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=80&q=80'
                }, {
                    id: ++state.idCounter,
                    location: 'Pantry Lt. 1',
                    category: 'lainnya',
                    priority: 'high',
                    description: 'Mesin dispenser air tidak mengeluarkan air panas.',
                    status: 'open',
                    date: '19 Jun 2026',
                    time: '08:10',
                    photo: 'https://images.unsplash.com/photo-1595257841882-d7e9e45a5be6?auto=format&fit=crop&w=80&q=80'
                }];
                state.history = reports;
                updateBadge();
            }
            seedHistory();

            // ─── render history ────────────────────────────────────
            function renderHistory() {
                const filter = state.filter.toLowerCase().trim();
                let items = state.history;
                if (filter) {
                    items = items.filter(r =>
                        r.location.toLowerCase().includes(filter) ||
                        r.category.includes(filter) ||
                        r.status.includes(filter) ||
                        r.description.toLowerCase().includes(filter)
                    );
                }

                if (items.length === 0) {
                    historyList.innerHTML = '';
                    historyEmpty.style.display = 'block';
                    return;
                }
                historyEmpty.style.display = 'none';

                const statusMap = {
                    done: { label: 'SELESAI', cls: 'status-done' },
                    progress: { label: 'PROGRESS', cls: 'status-progress' },
                    open: { label: 'DIBUKA', cls: 'status-open' },
                };
                const iconMap = {
                    listrik: 'fa-bolt',
                    ac: 'fa-snowflake',
                    bangunan: 'fa-building',
                    lainnya: 'fa-ellipsis',
                };
                const labelMap = {
                    listrik: 'LISTRIK',
                    ac: 'AC',
                    bangunan: 'BANGUNAN',
                    lainnya: 'LAINNYA',
                };

                let html = '';
                items.forEach(r => {
                    const st = statusMap[r.status] || statusMap.open;
                    const icon = iconMap[r.category] || 'fa-ellipsis';
                    const label = labelMap[r.category] || r.category;
                    html += `
                        <div class="history-item">
                            <div class="info">
                                <div class="top">
                                    <span class="status-badge ${st.cls}">${st.label}</span>
                                    <span style="font-size:10px;color:#94a3b8;">${r.date} · ${r.time}</span>
                                </div>
                                <div class="title">
                                    <i class="fa-solid ${icon}" style="color:#1e56cf;"></i>
                                    ${label}
                                    <span style="font-weight:400;font-size:12px;color:#64748b;margin-left:2px;">·</span>
                                    <span style="font-weight:500;font-size:12px;color:#475569;">${r.location}</span>
                                </div>
                                <div class="meta">
                                    <span><i class="fa-regular fa-message"></i> ${r.description.length > 60 ? r.description.slice(0,60)+'…' : r.description}</span>
                                    <span><i class="fa-regular fa-flag"></i> ${r.priority.toUpperCase()}</span>
                                </div>
                            </div>
                            <img class="thumb" src="${r.photo}" alt="${r.category}" loading="lazy" />
                            <div class="arrow"><i class="fa-solid fa-chevron-right"></i></div>
                        </div>
                    `;
                });
                historyList.innerHTML = html;
            }
            renderHistory();

            function updateBadge() {
                historyBadge.textContent = state.history.length;
            }

            // ─── tab switching ─────────────────────────────────────
            function switchTab(tabId) {
                tabs.forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
                pageReport.classList.toggle('active', tabId === 'report');
                pageHistory.classList.toggle('active', tabId === 'history');
                // scroll to top
                const content = document.querySelector('.app-content');
                if (content) content.scrollTop = 0;
            }

            tabs.forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // ─── category selection ──────────────────────────────
            categoryGroup.addEventListener('click', (e) => {
                const chip = e.target.closest('.category-chip');
                if (!chip) return;
                categoryGroup.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                state.category = chip.dataset.category;
                categoryHidden.value = state.category;
            });

            // ─── priority selection ──────────────────────────────
            priorityGroup.addEventListener('click', (e) => {
                const pill = e.target.closest('.priority-pill');
                if (!pill) return;
                priorityGroup.querySelectorAll('.priority-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                state.priority = pill.dataset.priority;
                priorityHidden.value = state.priority;
            });

            // ─── character counter ───────────────────────────────
            descInput.addEventListener('input', function() {
                const len = this.value.length;
                charCount.textContent = len;
                if (len > 500) {
                    this.value = this.value.slice(0, 500);
                    charCount.textContent = 500;
                }
            });

            // ─── photo handling ──────────────────────────────────
            function addPhotos(files) {
                const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
                if (valid.length === 0) {
                    showToast('Pilih file gambar yang valid', 'error');
                    return;
                }
                let loaded = 0;
                valid.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        state.photos.push({ id: Date.now() + Math.random() * 10000, dataURL: e.target
                                .result });
                        loaded++;
                        if (loaded === valid.length) {
                            renderPhotos();
                            showToast(`${valid.length} foto berhasil ditambahkan`, 'success');
                        }
                    };
                    reader.onerror = () => {
                        loaded++;
                        if (loaded === valid.length) renderPhotos();
                    };
                    reader.readAsDataURL(file);
                });
            }

            function renderPhotos() {
                if (state.photos.length === 0) {
                    photoArea.classList.remove('has-images');
                    photoPreview.innerHTML = '';
                    photoCount.value = '0';
                    return;
                }
                photoArea.classList.add('has-images');
                photoPreview.innerHTML = state.photos.map(p =>
                    `<img src="${p.dataURL}" alt="foto" loading="lazy" />`
                ).join('');
                photoCount.value = state.photos.length;
            }

            btnCamera.addEventListener('click', () => {
                fileInput.accept = 'image/*';
                fileInput.capture = 'environment';
                fileInput.click();
            });

            btnGallery.addEventListener('click', () => {
                fileInput.accept = 'image/*';
                fileInput.removeAttribute('capture');
                fileInput.click();
            });

            fileInput.addEventListener('change', function() {
                if (this.files.length) {
                    addPhotos(this.files);
                    this.value = '';
                }
            });

            // drag & drop
            photoArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                photoArea.classList.add('dragover');
            });
            photoArea.addEventListener('dragleave', () => {
                photoArea.classList.remove('dragover');
            });
            photoArea.addEventListener('drop', (e) => {
                e.preventDefault();
                photoArea.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    addPhotos(e.dataTransfer.files);
                }
            });

            // click area to open gallery
            photoArea.addEventListener('click', (e) => {
                if (e.target.closest('.upload-buttons') || e.target.closest('.photo-preview-grid')) return;
                fileInput.accept = 'image/*';
                fileInput.removeAttribute('capture');
                fileInput.click();
            });

            // ─── submit ──────────────────────────────────────────
            reportForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const location = locationInput.value.trim();
                if (!location) {
                    showToast('Lokasi kerusakan wajib diisi', 'error');
                    locationInput.focus();
                    return;
                }
                const desc = descInput.value.trim();
                if (!desc) {
                    showToast('Deskripsi kerusakan wajib diisi', 'error');
                    descInput.focus();
                    return;
                }
                if (state.photos.length === 0) {
                    showToast('Tambahkan minimal 1 foto', 'error');
                    return;
                }

                const now = new Date();
                const date = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                const report = {
                    id: ++state.idCounter,
                    location,
                    category: state.category,
                    priority: state.priority,
                    description: desc,
                    status: 'open',
                    date,
                    time,
                    photo: state.photos[0].dataURL,
                };

                state.history.unshift(report);
                renderHistory();
                updateBadge();

                // reset form
                locationInput.value = '';
                descInput.value = '';
                charCount.textContent = '0';
                state.photos = [];
                renderPhotos();

                // reset category & priority
                categoryGroup.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                document.querySelector('.category-chip[data-category="listrik"]')?.classList.add('active');
                state.category = 'listrik';
                categoryHidden.value = 'listrik';

                priorityGroup.querySelectorAll('.priority-pill').forEach(p => p.classList.remove('active'));
                document.querySelector('.priority-pill[data-priority="normal"]')?.classList.add('active');
                state.priority = 'normal';
                priorityHidden.value = 'normal';

                showToast('✅ Laporan berhasil dikirim!', 'success');

                // switch to history after delay
                setTimeout(() => {
                    switchTab('history');
                }, 700);
            });

            // ─── search ──────────────────────────────────────────
            searchInput.addEventListener('input', function() {
                state.filter = this.value;
                renderHistory();
            });

            // ─── filter button (demo) ──────────────────────────
            filterBtn.addEventListener('click', () => {
                showToast('🔍 Menampilkan semua laporan', 'info');
                searchInput.value = '';
                state.filter = '';
                renderHistory();
            });

            // ─── avatar click ──────────────────────────────────
            $('#avatarBtn').addEventListener('click', () => {
                showToast('👤 Tukang Lapor · General Affair', 'info');
            });

            // ─── toast ──────────────────────────────────────────
            function showToast(msg, type) {
                type = type || 'info';
                toast.textContent = msg;
                toast.className = 'toast ' + type;
                // force reflow
                void toast.offsetWidth;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            // ─── init ────────────────────────────────────────────
            // set default active states
            document.querySelector('.category-chip[data-category="listrik"]')?.classList.add('active');
            document.querySelector('.priority-pill[data-priority="normal"]')?.classList.add('active');

            console.log('🏢 Building Care System v3.5 · fully functional');
        })();
    </script>

</body>
</html>
