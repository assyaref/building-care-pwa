<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Building Care System Enterprise v3.5</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ── phone frame ── */
        .phone {
            width: 100%;
            max-width: 390px;
            background: #fff;
            border-radius: 40px;
            border: 8px solid #1e293b;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            position: relative;
            aspect-ratio: 9 / 19;
            display: flex;
            flex-direction: column;
        }

        /* ── scrollable pages ── */
        .page {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #1e56cf;
            padding-bottom: 72px;
            /* room for bottom nav */;
        }

        .page-content {
            flex: 1;
            background: #fff;
            border-radius: 28px 28px 0 0;
            padding: 20px 18px 28px;
        }

        /* ── bottom nav ── */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #e9edf2;
            padding: 6px 0 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
            box-shadow: 0 -6px 20px rgba(0, 0, 0, 0.04);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            font-size: 10px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px 16px;
            border-radius: 20px;
        }
        .nav-btn i {
            font-size: 18px;
        }
        .nav-btn.active {
            color: #1e56cf;
            font-weight: 700;
        }
        .nav-btn:hover {
            color: #1e293b;
        }
        .nav-btn.active:hover {
            color: #1e56cf;
        }

        /* ── category & priority cards ── */
        .category-card,
        .priority-card {
            transition: all 0.15s ease;
            cursor: pointer;
            user-select: none;
        }
        .category-card.active {
            border-color: #1e56cf;
            background: #eff4ff;
            color: #1e56cf;
        }
        .priority-card.active {
            border-color: currentColor;
            background: #f8fafc;
        }

        /* ── photo drop zone ── */
        .photo-zone {
            border: 2px dashed #d1d9e6;
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            color: #94a3b8;
            background: #fafbfc;
            transition: border-color 0.2s, background 0.2s;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .photo-zone.dragover {
            border-color: #1e56cf;
            background: #eff4ff;
        }
        .photo-zone.has-image {
            border-style: solid;
            border-color: #22c55e;
            background: #f0fdf4;
        }
        .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 4px;
        }
        .photo-preview img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #e9edf2;
            background: #f8fafc;
        }

        /* ── history list ── */
        .history-item {
            transition: background 0.15s;
        }
        .history-item:hover {
            background: #f8fafc;
        }

        /* ── scrollbar ── */
        .page::-webkit-scrollbar {
            width: 3px;
        }
        .page::-webkit-scrollbar-track {
            background: transparent;
        }
        .page::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        .page-content::-webkit-scrollbar {
            width: 3px;
        }
        .page-content::-webkit-scrollbar-thumb {
            background: #d1d9e6;
            border-radius: 10px;
        }

        /* ── utility ── */
        .hidden-page {
            display: none !important;
        }

        /* ── toast ── */
        .toast {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            z-index: 30;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* responsive tweaks */
        @media (max-width: 420px) {
            .phone {
                border-width: 4px;
                border-radius: 28px;
            }
            .page-content {
                padding: 16px 14px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="phone" id="app">

        <!-- ─── TOAST ─── -->
        <div class="toast" id="toast"></div>

        <!-- ═══════════════════════════════════════════════ -->
        <!--  PAGE : REPORT                                -->
        <!-- ═══════════════════════════════════════════════ -->
        <div id="page-report" class="page">
            <!-- status bar -->
            <div class="text-white px-5 pt-3 pb-1 flex justify-between items-center text-xs font-semibold shrink-0">
                <span>9:41</span>
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-signal"></i>
                    <i class="fa-solid fa-wifi"></i>
                    <i class="fa-solid fa-battery-full text-base"></i>
                </div>
            </div>

            <!-- header -->
            <div class="px-5 py-2 flex justify-between items-center text-white shrink-0">
                <div class="flex items-center gap-3">
                    <button class="text-xl" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
                    <div>
                        <h2 class="font-bold text-sm flex items-center gap-1">Halo, Tukang Lapor 👋</h2>
                        <p class="text-xs text-slate-200">General Affair</p>
                    </div>
                </div>
                <button class="text-xl" aria-label="Logout"><i class="fa-solid fa-right-from-bracket rotate-180"></i></button>
            </div>

            <!-- form content -->
            <div class="page-content" id="report-content">
                <!-- lokasi -->
                <div class="mb-4">
                    <label for="location" class="block text-xs font-bold text-slate-800 mb-1.5">
                        <i class="fa-solid fa-location-dot mr-1"></i> Lokasi Kerusakan
                    </label>
                    <input id="location" type="text" placeholder="Contoh : Ruang Meeting"
                    class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-xs focus:outline-none focus:border-blue-500 bg-slate-50 placeholder:text-slate-400 transition" />
                </div>

                <!-- kategori -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-800 mb-1.5">
                        <i class="fa-solid fa-cubes mr-1"></i> Kategori Kerusakan
                    </label>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <button type="button" data-category="listrik"
                        class="category-card border-2 border-blue-600 rounded-xl p-3 flex flex-col items-center justify-center gap-1 bg-blue-50/50 text-blue-600 font-bold text-[10px] active">
                        <i class="fa-solid fa-bolt text-lg"></i> LISTRIK
                    </button>
                    <button type="button" data-category="ac"
                    class="category-card border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center gap-1 text-slate-600 font-bold text-[10px] hover:bg-slate-50">
                    <i class="fa-solid fa-snowflake text-lg text-blue-400"></i> AC
                </button>
            </div>
            <button type="button" data-category="bangunan"
            class="category-card w-full border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center gap-1 text-slate-600 font-bold text-[10px] hover:bg-slate-50">
            <i class="fa-solid fa-building text-lg text-slate-500"></i> KONDISI BANGUNAN
        </button>
        <input type="hidden" id="selected-category" value="listrik" />
    </div>

    <!-- prioritas -->
    <div class="mb-4">
        <label class="block text-xs font-bold text-slate-800 mb-1.5">
            <i class="fa-solid fa-flag mr-1"></i> Prioritas
        </label>
        <div class="space-y-2" id="priority-group">
            <button type="button" data-priority="normal"
            class="priority-card w-full flex items-center gap-2 border border-green-500 bg-green-50/30 rounded-xl p-2.5 text-xs font-semibold text-slate-700 active">
            <span class="w-3 h-3 rounded-full bg-green-500 inline-block shrink-0"></span> NORMAL
        </button>
        <button type="button" data-priority="high"
        class="priority-card w-full flex items-center gap-2 border border-slate-200 rounded-xl p-2.5 text-xs font-semibold text-slate-700">
        <span class="w-3 h-3 rounded-full bg-amber-500 inline-block shrink-0"></span> HIGH
    </button>
    <button type="button" data-priority="urgent"
    class="priority-card w-full flex items-center gap-2 border border-slate-200 rounded-xl p-2.5 text-xs font-semibold text-slate-700">
    <span class="w-3 h-3 rounded-full bg-red-500 inline-block shrink-0"></span> URGENT
</button>
<input type="hidden" id="selected-priority" value="normal" />
</div>
</div>

<!-- deskripsi -->
<div class="mb-4">
    <label for="description" class="block text-xs font-bold text-slate-800 mb-1.5">
        <i class="fa-solid fa-pen-to-square mr-1"></i> Deskripsi Kerusakan
    </label>
    <textarea id="description" placeholder="Jelaskan kerusakan secara detail..." rows="3"
    class="w-full border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-blue-500 bg-slate-50 placeholder:text-slate-400 resize-none transition"></textarea>
    <div class="text-right text-[10px] text-slate-400 mt-0.5">
        <span id="char-count">0</span> / 500 karakter
    </div>
</div>

<!-- foto -->
<div class="mb-4">
    <label class="block text-xs font-bold text-slate-800 mb-1.5">
        <i class="fa-solid fa-camera mr-1"></i> Foto Kerusakan
    </label>
    <div class="flex gap-3 mb-3">
        <button id="btn-camera" class="bg-blue-600 text-white rounded-xl py-2 px-3 text-xs font-semibold flex items-center justify-center gap-1.5 shadow-sm hover:bg-blue-700 transition flex-1">
            <i class="fa-solid fa-camera"></i> Ambil Foto
        </button>
        <button id="btn-gallery" class="bg-slate-100 text-slate-700 rounded-xl py-2 px-3 text-xs font-semibold flex items-center justify-center gap-1.5 hover:bg-slate-200 transition flex-1">
            <i class="fa-solid fa-image"></i> Galeri
        </button>
    </div>
    <div id="photo-zone" class="photo-zone">
        <i class="fa-solid fa-images text-xl"></i>
        <p class="text-[10px] font-medium text-slate-500">Belum Ada Foto</p>
        <p class="text-[9px]">Ambil foto atau pilih dari galeri</p>
        <div id="photo-preview" class="photo-preview"></div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple class="hidden" />
</div>

<!-- submit -->
<button id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md transition-colors">
    <i class="fa-solid fa-paper-plane text-[10px]"></i> Kirim Report
</button>
</div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!--  PAGE : HISTORY                              -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-history" class="page hidden-page">
    <!-- status bar -->
    <div class="text-white px-5 pt-3 pb-1 flex justify-between items-center text-xs font-semibold shrink-0">
        <span>9:41</span>
        <div class="flex items-center gap-1.5">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full text-base"></i>
        </div>
    </div>

    <!-- header -->
    <div class="px-5 py-2 flex justify-between items-center text-white shrink-0">
        <button class="text-xl" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
        <h2 class="font-bold text-sm">Riwayat Laporan</h2>
        <div class="w-5"></div>
    </div>

    <!-- history content -->
    <div class="page-content" id="history-content">
        <!-- search -->
        <div class="flex gap-2 mb-4">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input id="history-search" type="text" placeholder="Cari lokasi atau kategori..."
                class="w-full border border-slate-200 rounded-xl pl-8 pr-3 py-2 text-xs focus:outline-none focus:border-blue-500 bg-white placeholder:text-slate-400 transition" />
            </div>
            <button id="btn-filter" class="border border-blue-200 text-blue-600 bg-white px-3 rounded-xl text-xs flex items-center justify-center hover:bg-blue-50 transition">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </div>

        <!-- list -->
        <div id="history-list" class="space-y-3">
            <!-- items will be injected by JS -->
        </div>

        <!-- empty state (hidden by default) -->
        <div id="history-empty" class="hidden text-center py-8 text-slate-400">
            <i class="fa-regular fa-face-frown text-3xl mb-2 block"></i>
            <p class="text-sm font-medium">Belum ada laporan</p>
            <p class="text-xs">Mulai buat laporan pertama Anda</p>
        </div>
    </div>
</div>

<!-- ─── BOTTOM NAV ─── -->
<div class="bottom-nav">
    <button class="nav-btn active" data-page="report" aria-label="Report">
        <i class="fa-solid fa-file-invoice"></i>
        <span>Report</span>
    </button>
    <button class="nav-btn" data-page="history" aria-label="History">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>History</span>
    </button>
</div>

</div>
<!-- /phone -->


<script>
    (function() {
        'use strict';

        // ─── refs ──────────────────────────────────────────────
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const pageReport = $('#page-report');
        const pageHistory = $('#page-history');
        const navBtns = $$('.nav-btn');
        const toast = $('#toast');
        let toastTimer = null;

        // report form
        const locationInput = $('#location');
        const categoryBtns = $$('.category-card');
        const priorityBtns = $$('.priority-card');
        const descInput = $('#description');
        const charCount = $('#char-count');
        const photoZone = $('#photo-zone');
        const photoPreview = $('#photo-preview');
        const fileInput = $('#file-input');
        const btnCamera = $('#btn-camera');
        const btnGallery = $('#btn-gallery');
        const btnSubmit = $('#btn-submit');

        // history
        const historyList = $('#history-list');
        const historyEmpty = $('#history-empty');
        const searchInput = $('#history-search');

        // ─── state ──────────────────────────────────────────────
        const state = {
            category: 'listrik',
            priority: 'normal',
            photos: [], // array of { id, dataURL, file }
            history: [], // array of report objects
            idCounter: 0,
            filter: '',
        };

        // ─── seed history ──────────────────────────────────────
        function seedHistory() {
            const now = new Date();
            const reports = [
                { id: ++state.idCounter, location: 'Ruang Meeting', category: 'listrik',
                    priority: 'normal', description: 'Lampu mati total di ruang meeting utama.',
                    status: 'done', date: '24 Jun 2026', time: '10:30',
                    photo: 'https://images.unsplash.com/photo-1620283085439-39620a1e21c4?auto=format&fit=crop&w=80&q=80' },
                { id: ++state.idCounter, location: 'Ruang HR', category: 'ac',
                    priority: 'high', description: 'AC tidak dingin, suhu ruangan 30°C.',
                    status: 'progress', date: '23 Jun 2026', time: '14:15',
                    photo: 'https://images.unsplash.com/photo-1621905251189-08b45d6a269e?auto=format&fit=crop&w=80&q=80' },
                { id: ++state.idCounter, location: 'Toilet Lt. 2', category: 'bangunan',
                    priority: 'urgent', description: 'Kran air bocor parah, lantai tergenang.',
                    status: 'open', date: '22 Jun 2026', time: '09:45',
                    photo: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=80&q=80' },
                { id: ++state.idCounter, location: 'Ruang Server Lt.2', category: 'listrik',
                    priority: 'urgent', description: 'UPS berbunyi alarm, indikasi overload.',
                    status: 'progress', date: '20 Jun 2026', time: '11:20',
                    photo: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=80&q=80' },
            ];
            state.history = reports;
        }
        seedHistory();

        // ─── render history ────────────────────────────────────
        function renderHistory() {
            const filter = state.filter.toLowerCase().trim();
            let items = state.history;
            if (filter) {
                items = items.filter(r =>
                    r.location.toLowerCase().includes(filter) ||
                    r.category.includes(filter) ||
                    r.status.includes(filter)
                );
            }

            if (items.length === 0) {
                historyList.innerHTML = '';
                historyEmpty.classList.remove('hidden');
                return;
            }
            historyEmpty.classList.add('hidden');

            const statusMap = {
                done: { label: 'DONE', cls: 'bg-green-100 text-green-700' },
                progress: { label: 'PROGRESS', cls: 'bg-amber-100 text-amber-700' },
                open: { label: 'OPEN', cls: 'bg-red-100 text-red-700' },
            };
            const iconMap = {
                listrik: 'fa-bolt text-blue-600',
                ac: 'fa-snowflake text-blue-400',
                bangunan: 'fa-building text-slate-500',
            };
            const labelMap = {
                listrik: 'LISTRIK',
                ac: 'AC',
                bangunan: 'KONDISI BANGUNAN',
            };

            let html = '';
            items.forEach(r => {
                const st = statusMap[r.status] || statusMap.open;
                const icon = iconMap[r.category] || iconMap.bangunan;
                const label = labelMap[r.category] || r.category;
                html += `
                    <div class="history-item bg-white border border-slate-100 rounded-xl p-3 flex justify-between items-center shadow-sm">
                        <div class="space-y-1 flex-1 pr-2">
                            <span class="${st.cls} font-bold text-[8px] px-2 py-0.5 rounded-full inline-block">${st.label}</span>
                            <h4 class="text-xs font-bold text-slate-800 flex items-center gap-1.5">
                                <i class="fa-solid ${icon}"></i> ${label}
                            </h4>
                            <p class="text-[10px] text-slate-500">${r.location}</p>
                            <p class="text-[9px] text-slate-400"><i class="fa-regular fa-calendar mr-1"></i> ${r.date} • ${r.time}</p>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <img src="${r.photo}" alt="${r.category}" class="w-14 h-11 object-cover rounded-md bg-slate-100 border" loading="lazy" />
                            <i class="fa-solid fa-chevron-right text-slate-400 text-xs"></i>
                        </div>
                    </div>
                `;
            });
            historyList.innerHTML = html;
        }
        renderHistory();

        // ─── switch page ──────────────────────────────────────
        function switchPage(page) {
            const isReport = page === 'report';
            pageReport.classList.toggle('hidden-page', !isReport);
            pageHistory.classList.toggle('hidden-page', isReport);

            navBtns.forEach(btn => {
                const p = btn.dataset.page;
                btn.classList.toggle('active', p === page);
            });

            // scroll to top
            const target = isReport ? pageReport : pageHistory;
            target.scrollTop = 0;
        }

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => switchPage(btn.dataset.page));
        });

        // ─── category selection ──────────────────────────────
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                categoryBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                state.category = this.dataset.category;
                $('#selected-category').value = state.category;
            });
        });

        // ─── priority selection ──────────────────────────────
        priorityBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                priorityBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                state.priority = this.dataset.priority;
                $('#selected-priority').value = state.priority;
            });
        });

        // ─── character counter ───────────────────────────────
        descInput.addEventListener('input', function() {
            const len = this.value.length;
            charCount.textContent = len;
            if (len > 500) {
                this.value = this.value.slice(0, 500);
                charCount.textContent = 500;
            }
        });

        // ─── photo handling ──────────────────────────────────
        function addPhotos(files) {
            const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (valid.length === 0) {
                showToast('Pilih file gambar yang valid');
                return;
            }
            valid.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.photos.push({
                        id: Date.now() + Math.random() * 1000,
                        dataURL: e.target.result,
                        file: file,
                    });
                    renderPhotos();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderPhotos() {
            if (state.photos.length === 0) {
                photoZone.classList.remove('has-image');
                photoPreview.innerHTML = '';
                return;
            }
            photoZone.classList.add('has-image');
            photoPreview.innerHTML = state.photos.map(p =>
                `<img src="${p.dataURL}" alt="foto" loading="lazy" />`
            ).join('');
        }

        btnCamera.addEventListener('click', () => {
            fileInput.accept = 'image/*';
            fileInput.capture = 'environment';
            fileInput.click();
        });

        btnGallery.addEventListener('click', () => {
            fileInput.accept = 'image/*';
            fileInput.removeAttribute('capture');
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            if (this.files.length) {
                addPhotos(this.files);
                this.value = '';
            }
        });

        // drag & drop
        photoZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            photoZone.classList.add('dragover');
        });
        photoZone.addEventListener('dragleave', () => {
            photoZone.classList.remove('dragover');
        });
        photoZone.addEventListener('drop', (e) => {
            e.preventDefault();
            photoZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                addPhotos(e.dataTransfer.files);
            }
        });

        // ─── submit ──────────────────────────────────────────
        btnSubmit.addEventListener('click', function() {
            const location = locationInput.value.trim();
            if (!location) {
                showToast('Lokasi kerusakan wajib diisi');
                locationInput.focus();
                return;
            }
            const desc = descInput.value.trim();
            if (!desc) {
                showToast('Deskripsi kerusakan wajib diisi');
                descInput.focus();
                return;
            }
            if (state.photos.length === 0) {
                showToast('Tambahkan minimal 1 foto');
                return;
            }

            // build report
            const now = new Date();
            const date = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            const report = {
                id: ++state.idCounter,
                location,
                category: state.category,
                priority: state.priority,
                description: desc,
                status: 'open',
                date,
                time,
                photo: state.photos[0].dataURL, // use first as thumbnail
            };

            state.history.unshift(report);
            renderHistory();

            // reset form
            locationInput.value = '';
            descInput.value = '';
            charCount.textContent = '0';
            state.photos = [];
            renderPhotos();

            // reset category & priority to defaults
            categoryBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('.category-card[data-category="listrik"]').classList.add('active');
            state.category = 'listrik';
            $('#selected-category').value = 'listrik';

            priorityBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('.priority-card[data-priority="normal"]').classList.add('active');
            state.priority = 'normal';
            $('#selected-priority').value = 'normal';

            showToast('✅ Laporan berhasil dikirim!');

            // switch to history after a beat
            setTimeout(() => {
                switchPage('history');
            }, 600);
        });

        // ─── search ──────────────────────────────────────────
        searchInput.addEventListener('input', function() {
            state.filter = this.value;
            renderHistory();
        });

        // ─── toast ──────────────────────────────────────────
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        // ─── filter button (demo) ──────────────────────────
        $('#btn-filter').addEventListener('click', () => {
            showToast('🔍 Filter: menampilkan semua');
        });

        // ─── menu button (demo) ────────────────────────────
        document.querySelectorAll('#page-report .text-xl, #page-history .text-xl').forEach(el => {
            if (el.tagName === 'BUTTON' && el.querySelector('.fa-bars')) {
                el.addEventListener('click', () => showToast('📋 Menu utama'));
            }
            if (el.tagName === 'BUTTON' && el.querySelector('.fa-right-from-bracket')) {
                el.addEventListener('click', () => showToast('🚪 Logout'));
            }
        });

        // ─── init ────────────────────────────────────────────
        // ensure report page visible, history hidden
        switchPage('report');

        // set default active states
        document.querySelector('.category-card[data-category="listrik"]')?.classList.add('active');
        document.querySelector('.priority-card[data-priority="normal"]')?.classList.add('active');

        console.log('🏢 Building Care System v3.5 ready');
    })();
</script>

</body>
</html>
